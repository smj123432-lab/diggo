<rect x="558" y="80" width="61.5" height="18" rx="4" fill="#F0FDF4" stroke="#10B981"/><text x="588.75" y="93" font-size="10" fill="#10B981" text-anchor="middle" font-weight="bold" font-family="inherit">✓  해결 후</text>
<rect x="615" y="104" width="360" height="54" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
