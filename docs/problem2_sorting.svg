<text x="795" y="309" font-size="11" fill="#8B5CF6" text-anchor="middle" font-weight="bold" font-family="inherit">포커스 이벤트 → re-fetch</text>
<text x="795" y="326" font-size="9.5" fill="#64748B" text-anchor="middle" font-weight="normal" font-family="inherit">sortBy = 'deadline'  (동일 기준)</text>
<line x1="795" y1="356" x2="795" y2="371" stroke="#8B5CF6" stroke-width="1.8"/>
<polygon points="790,371 800,371 795,380" fill="#8B5CF6"/>
<text x="809" y="372" font-size="10" fill="#8B5CF6" text-anchor="start" font-weight="normal" font-family="inherit">동일 파라미터로 재요청</text>
<rect x="615" y="380" width="360" height="48" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
<text x="795" y="400" font-size="12" fill="#047857" text-anchor="middle" font-weight="bold" font-family="inherit">순서 유지  ✓</text>
<text x="795" y="417" font-size="9.5" fill="#047857" text-anchor="middle" font-weight="normal" font-family="inherit">SSR · 클라이언트 정렬 기준 통일 → 일관성 확보</text>
<line x1="540" y1="85" x2="540" y2="465" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="6,4"/>
<rect x="40" y="476" width="1000" height="34" rx="6" fill="#FFFFFF" stroke="#1D4ED8" stroke-width="1"/>
<text x="540" y="498" font-size="10" fill="#1D4ED8" text-anchor="middle" font-weight="normal" font-family="inherit">핵심: SSR prefetchInfiniteQuery의 정렬 기준과 TanStack Query queryKey의 기본 필터가 100% 일치해야 hydration 이후 re-fetch 시 데이터가 교체되지 않음</text>
