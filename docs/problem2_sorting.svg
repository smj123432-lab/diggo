<text x="540" y="34" font-size="17" fill="#0F172A" text-anchor="middle" font-weight="700" font-family="inherit">SSR ↔ TanStack Query 정렬 불일치</text>
<text x="540" y="56" font-size="11" fill="#64748B" text-anchor="middle" font-weight="normal" font-family="inherit">staleTime 만료 후 re-fetch 시 서버/클라이언트 정렬 기준 충돌</text>
