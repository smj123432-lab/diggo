<polygon points="790,187 800,187 795,196" fill="#10B981"/>
<text x="809" y="188" font-size="10" fill="#10B981" text-anchor="start" font-weight="normal" font-family="inherit">동일 기준으로 hydration</text>
<rect x="615" y="196" width="360" height="54" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
<text x="795" y="217" font-size="11" fill="#10B981" text-anchor="middle" font-weight="bold" font-family="inherit">Browser 초기 화면</text>
<text x="795" y="234" font-size="9.5" fill="#64748B" text-anchor="middle" font-weight="normal" font-family="inherit">목록 순서: 마감임박순으로 표시</text>
