<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520">
  <defs><style>text{font-family:-apple-system,"Segoe UI",sans-serif}</style></defs>
  <rect width="1080" height="520" fill="#FAFAFA"/>
