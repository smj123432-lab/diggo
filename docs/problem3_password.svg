<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="600" viewBox="0 0 1080 600">
  <defs><style>text{font-family:-apple-system,"Segoe UI",sans-serif}</style></defs>
  <rect width="1080" height="600" fill="#FAFAFA"/>
<rect x="0" y="0" width="1080" height="600" rx="0" fill="#FAFAFA" stroke="#E2E8F0" stroke-width="1"/>
<text x="540" y="34" font-size="17" fill="#0F172A" text-anchor="middle" font-weight="700" font-family="inherit">비밀번호 찾기  —  False Success</text>
<text x="540" y="56" font-size="11" fill="#64748B" text-anchor="middle" font-weight="normal" font-family="inherit">Supabase enumeration 방지 정책으로 SDK가 미가입 이메일에도 항상 error: null 반환</text>
<line x1="40" y1="68" x2="1040" y2="68" stroke="#E2E8F0" stroke-width="1"/>
<rect x="30" y="82" width="490" height="470" rx="10" fill="#FEF2F2" opacity="0.4"/>
<rect x="38" y="82" width="68.0" height="18" rx="4" fill="#FEF2F2" stroke="#EF4444"/><text x="72.0" y="95" font-size="10" fill="#EF4444" text-anchor="middle" font-weight="bold" font-family="inherit">❌  문제 흐름</text>
<rect x="55" y="102" width="370" height="44" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
<text x="240" y="118" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="bold" font-family="inherit">사용자</text>
<text x="240" y="134" font-size="9.5" fill="#64748B" text-anchor="middle" font-weight="normal" font-family="inherit">미가입 이메일 입력 후 전송</text>
<line x1="240" y1="162" x2="240" y2="169" stroke="#3B82F6" stroke-width="1.8"/>
<polygon points="235,169 245,169 240,178" fill="#3B82F6"/>
<rect x="55" y="178" width="370" height="50" rx="8" fill="#F0F4FF" stroke="#3B82F6" stroke-width="1.5"/>
<text x="240" y="197" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="bold" font-family="inherit">Client</text>
<text x="240" y="213" font-size="9.5" fill="#64748B" text-anchor="middle" font-weight="normal" font-family="inherit">supabase.auth.resetPasswordForEmail(email)</text>
<line x1="240" y1="244" x2="240" y2="251" stroke="#EF4444" stroke-width="1.8"/>
<polygon points="235,251 245,251 240,260" fill="#EF4444"/>
<rect x="55" y="260" width="370" height="58" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
<text x="240" y="283" font-size="11" fill="#EF4444" text-anchor="middle" font-weight="bold" font-family="inherit">Supabase Auth</text>
<text x="240" y="299" font-size="9.5" fill="#64748B" text-anchor="middle" font-weight="normal" font-family="inherit">Enumeration 방지 옵션 ON</text>
<text x="240" y="302" font-size="9.5" fill="#B91C1C" text-anchor="middle" font-weight="normal" font-family="inherit">이메일 존재 여부 무관, 항상 { error: null } 반환</text>
<line x1="240" y1="334" x2="240" y2="341" stroke="#EF4444" stroke-width="1.8"/>
<polygon points="235,341 245,341 240,350" fill="#EF4444"/>
<rect x="55" y="350" width="370" height="44" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
<text x="240" y="366" font-size="11" fill="#EF4444" text-anchor="middle" font-weight="bold" font-family="inherit">Client</text>
<text x="240" y="382" font-size="9.5" fill="#64748B" text-anchor="middle" font-weight="normal" font-family="inherit">error: null  →  성공으로 판단</text>
<line x1="240" y1="410" x2="240" y2="417" stroke="#EF4444" stroke-width="1.8"/>
<polygon points="235,417 245,417 240,426" fill="#EF4444"/>
<rect x="55" y="426" width="370" height="46" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
<text x="240" y="444" font-size="12" fill="#B91C1C" text-anchor="middle" font-weight="bold" font-family="inherit">"메일을 확인해 주세요"  표시  ❌</text>
<text x="240" y="461" font-size="9.5" fill="#B91C1C" text-anchor="middle" font-weight="normal" font-family="inherit">미가입 이메일도 성공 화면 → 사용자 혼란</text>
<rect x="570" y="82" width="490" height="470" rx="10" fill="#F0FDF4" opacity="0.4"/>
<rect x="578" y="82" width="61.5" height="18" rx="4" fill="#F0FDF4" stroke="#10B981"/><text x="608.75" y="95" font-size="10" fill="#10B981" text-anchor="middle" font-weight="bold" font-family="inherit">✓  해결 후</text>
<rect x="595" y="102" width="370" height="44" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
<text x="780" y="118" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="bold" font-family="inherit">사용자</text>
<text x="780" y="134" font-size="9.5" fill="#64748B" text-anchor="middle" font-weight="normal" font-family="inherit">미가입 이메일 입력 후 전송</text>
<line x1="780" y1="162" x2="780" y2="169" stroke="#3B82F6" stroke-width="1.8"/>
<polygon points="775,169 785,169 780,178" fill="#3B82F6"/>
<rect x="595" y="178" width="370" height="50" rx="8" fill="#F0F4FF" stroke="#3B82F6" stroke-width="1.5"/>
<text x="780" y="197" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="bold" font-family="inherit">Client</text>
<text x="780" y="213" font-size="9.5" fill="#64748B" text-anchor="middle" font-weight="normal" font-family="inherit">POST  /api/auth/reset-password  (API Route 경유)</text>
<line x1="780" y1="244" x2="780" y2="251" stroke="#10B981" stroke-width="1.8"/>
<polygon points="775,251 785,251 780,260" fill="#10B981"/>
<rect x="595" y="260" width="370" height="58" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
<text x="780" y="283" font-size="11" fill="#10B981" text-anchor="middle" font-weight="bold" font-family="inherit">API Route  (서버)</text>
<text x="780" y="299" font-size="9.5" fill="#64748B" text-anchor="middle" font-weight="normal" font-family="inherit">admin REST API로 이메일 존재 확인</text>
<text x="780" y="302" font-size="9.5" fill="#047857" text-anchor="middle" font-weight="normal" font-family="inherit">GET /auth/v1/admin/users?filter=email</text>
<line x1="780" y1="334" x2="780" y2="341" stroke="#10B981" stroke-width="1.8"/>
<polygon points="775,341 785,341 780,350" fill="#10B981"/>
<rect x="595" y="350" width="370" height="44" rx="8" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1.5"/>
<text x="780" y="367" font-size="11" fill="#8B5CF6" text-anchor="middle" font-weight="bold" font-family="inherit">유저 존재 여부 판별</text>
<text x="780" y="384" font-size="9.5" fill="#8B5CF6" text-anchor="middle" font-weight="normal" font-family="inherit">users.some(u =&gt; u.email === email)</text>
<line x1="780" y1="394" x2="665" y2="420" stroke="#EF4444" stroke-width="1.5"/>
<line x1="780" y1="394" x2="895" y2="420" stroke="#10B981" stroke-width="1.5"/>
<rect x="605" y="420" width="155" height="44" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
<text x="682" y="438" font-size="10" fill="#B91C1C" text-anchor="middle" font-weight="bold" font-family="inherit">없음  →  404 반환</text>
<text x="682" y="453" font-size="9.5" fill="#B91C1C" text-anchor="middle" font-weight="normal" font-family="inherit">"가입되지 않은 이메일"</text>
<rect x="800" y="420" width="155" height="44" rx="6" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
<text x="878" y="438" font-size="10" fill="#047857" text-anchor="middle" font-weight="bold" font-family="inherit">있음  →  이메일 전송</text>
<text x="878" y="453" font-size="9.5" fill="#047857" text-anchor="middle" font-weight="normal" font-family="inherit">정상 발송  ✓</text>
<rect x="595" y="480" width="370" height="46" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
<text x="780" y="498" font-size="12" fill="#047857" text-anchor="middle" font-weight="bold" font-family="inherit">정확한 피드백 제공  ✓</text>
<text x="780" y="515" font-size="9.5" fill="#047857" text-anchor="middle" font-weight="normal" font-family="inherit">미가입 → 에러 표시  /  가입됨 → 메일 발송</text>
<line x1="540" y1="83" x2="540" y2="546" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="6,4"/>
<rect x="30" y="552" width="1020" height="36" rx="6" fill="#FFFFFF" stroke="#1D4ED8" stroke-width="1"/>
<text x="540" y="575" font-size="10" fill="#1D4ED8" text-anchor="middle" font-weight="normal" font-family="inherit">핵심: 보안 기능(enumeration 방지)이 UX를 깨는 상황 → SDK를 우회해 서버에서 직접 검증하는 구조로 책임 분리</text>
</svg>