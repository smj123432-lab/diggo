<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <defs>
    <style>text{font-family:-apple-system,"Segoe UI",sans-serif}</style>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
    <marker id="ad" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#999"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="520" fill="#ffffff"/>
<text x="480" y="36" font-size="16" fill="#111" text-anchor="middle" font-weight="bold">Performance Score  73점 → 83점  (+10점)</text>
<line x1="40" y1="50" x2="920" y2="50" stroke="#eee" stroke-width="1"/>
<text x="230" y="72" font-size="13" fill="#C62828" text-anchor="middle" font-weight="bold">BEFORE  ·  캐싱 없음</text>
<rect x="50" y="88" width="360" height="80" rx="8" fill="#FFF8F8" stroke="#E57373" stroke-width="1.5"/>
<text x="70" y="108" font-size="12" fill="#C62828" text-anchor="start" font-weight="bold">문제 1  —  LCP 9.0s</text>
<text x="70" y="128" font-size="11" fill="#555" text-anchor="start" font-weight="normal">매 요청마다 Supabase 재조회</text>
<text x="70" y="146" font-size="11" fill="#555" text-anchor="start" font-weight="normal">→ 서버 응답 지연 → 첫 화면 느림</text>
<rect x="50" y="188" width="360" height="80" rx="8" fill="#FFF8F8" stroke="#E57373" stroke-width="1.5"/>
<text x="70" y="208" font-size="12" fill="#C62828" text-anchor="start" font-weight="bold">문제 2  —  TBT 70ms</text>
<text x="70" y="228" font-size="11" fill="#555" text-anchor="start" font-weight="normal">캐싱 없이 매번 서버 재렌더</text>
<text x="70" y="246" font-size="11" fill="#555" text-anchor="start" font-weight="normal">→ 무거운 JS 번들 → 브라우저 블로킹</text>
<line x1="230" y1="268" x2="230" y2="298" stroke="#C62828" stroke-width="1.4" marker-end="url(#a)"/>
<rect x="100" y="298" width="260" height="56" rx="8" fill="#FFEBEE" stroke="#C62828" stroke-width="2"/>
<text x="230" y="323" font-size="12" fill="#C62828" text-anchor="middle" font-weight="normal">Performance Score</text>
<text x="230" y="343" font-size="18" fill="#C62828" text-anchor="middle" font-weight="bold">73점</text>
<text x="720" y="72" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">AFTER  ·  캐싱 적용</text>
<rect x="550" y="88" width="360" height="80" rx="8" fill="#F1F8E9" stroke="#81C784" stroke-width="1.5"/>
<text x="570" y="108" font-size="12" fill="#2E7D32" text-anchor="start" font-weight="bold">해결 1  —  LCP 4.4s  (-51%)</text>
<text x="570" y="128" font-size="11" fill="#555" text-anchor="start" font-weight="normal">'use cache'  +  cacheLife  +  cacheTag</text>
<text x="570" y="146" font-size="11" fill="#555" text-anchor="start" font-weight="normal">→ Supabase 재조회 0회 → 즉시 응답</text>
<rect x="550" y="188" width="360" height="80" rx="8" fill="#F1F8E9" stroke="#81C784" stroke-width="1.5"/>
<text x="570" y="208" font-size="12" fill="#2E7D32" text-anchor="start" font-weight="bold">해결 2  —  TBT 0ms</text>
<text x="570" y="228" font-size="11" fill="#555" text-anchor="start" font-weight="normal">cacheComponents: true  +  SSR 정렬 통일</text>
<text x="570" y="246" font-size="11" fill="#555" text-anchor="start" font-weight="normal">→ 렌더 캐싱 → 경량 JS → 블로킹 제거</text>
<line x1="730" y1="268" x2="730" y2="298" stroke="#2E7D32" stroke-width="1.4" marker-end="url(#a)"/>
<rect x="600" y="298" width="260" height="56" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
<text x="730" y="323" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="normal">Performance Score</text>
<text x="730" y="343" font-size="18" fill="#2E7D32" text-anchor="middle" font-weight="bold">83점  (+10점)</text>
<line x1="420" y1="200" x2="540" y2="200" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#a)"/>
<text x="480" y="192" font-size="11" fill="#888" text-anchor="middle" font-weight="normal">캐싱 적용</text>
<line x1="480" y1="58" x2="480" y2="380" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4,4"/>
<line x1="40" y1="376" x2="920" y2="376" stroke="#eee" stroke-width="1"/>
<rect x="40" y="390" width="880" height="30" rx="6" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1.5"/>
<text x="480" y="410" font-size="11" fill="#555" text-anchor="middle" font-weight="normal">'use cache'   cacheLife('seconds')   cacheTag('jobs')   cacheComponents: true   revalidateTag('jobs','max')</text>
<text x="480" y="450" font-size="11" fill="#999" text-anchor="middle" font-weight="normal">TTFB 10ms 이하  ·  DB 부하 없음  ·  데이터 정합성은 revalidateTag로 보장</text>
</svg>